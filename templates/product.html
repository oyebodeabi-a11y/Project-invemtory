{% extends "layout.html" %}
{% block title %}
Add New Product
{% endblock %}
{% block content %}
        <form action="{{ url_for('addrec') }}" method="POST">
            <h3>Please Add the New Product Information:</h3>
            Name<br>
            <input type="text" name="nm" /><br>

            Price<br>
            <input type="number" name="price" step="0.01" /><br>

            Quantity<br>
            <input type="text" name="quantity" /><br>

            Batch Number<br>
            <input type="text" name="batchno" /><br>

            <input type="submit" value="Submit" /><br>
        </form>
{% endblock %}
